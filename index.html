<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EAN Price Scraper</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">
    <div class="max-w-6xl mx-auto py-10 px-4">
        <h1 class="text-3xl font-bold mb-2">EAN Price Scraper Tool</h1>
        <p class="text-gray-600 mb-8">Automated Market Price Extraction Engine</p>

        <div class="bg-white p-6 rounded-lg shadow-md mb-8">
            <form id="scrapeForm" class="space-y-4">
                <div>
                    <label class="block font-semibold mb-1">Market (Country Code)</label>
                    <input type="text" id="market" value="UK" required class="w-full md:w-1/3 border p-2 rounded" placeholder="e.g. UK, FR, DE, NL">
                </div>
                <div>
                    <label class="block font-semibold mb-1">EANs (1 per line, max 10)</label>
                    <textarea id="eans" rows="6" required class="w-full border p-2 rounded font-mono text-sm" placeholder="5010003000000&#10;4008400400927"></textarea>
                </div>
                <button type="submit" id="submitBtn" class="bg-blue-600 text-white px-6 py-2 rounded font-semibold hover:bg-blue-700 transition">
                    Run Scraper
                </button>
            </form>
        </div>

        <div id="loading" class="hidden text-center py-10">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"></div>
            <p class="text-gray-600 font-medium">Scraping in progress... this may take up to 30 seconds per EAN.</p>
        </div>

        <div id="resultsContainer" class="hidden">
            <h2 class="text-xl font-bold mb-4">Results</h2>
            <div class="overflow-x-auto bg-white rounded-lg shadow-md">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-100 border-b">
                            <th class="p-3 text-sm font-semibold text-gray-600">EAN</th>
                            <th class="p-3 text-sm font-semibold text-gray-600">Vendor</th>
                            <th class="p-3 text-sm font-semibold text-gray-600">Currency</th>
                            <th class="p-3 text-sm font-semibold text-gray-600">RSV (incl VAT)</th>
                            <th class="p-3 text-sm font-semibold text-gray-600">VAT Info</th>
                            <th class="p-3 text-sm font-semibold text-gray-600">Promo</th>
                            <th class="p-3 text-sm font-semibold text-gray-600">Type Flag</th>
                            <th class="p-3 text-sm font-semibold text-gray-600">Pack Format</th>
                            <th class="p-3 text-sm font-semibold text-gray-600">Source</th>
                        </tr>
                    </thead>
                    <tbody id="resultsBody">
                        <!-- Populated via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('scrapeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const loading = document.getElementById('loading');
            const resultsContainer = document.getElementById('resultsContainer');
            const resultsBody = document.getElementById('resultsBody');
            
            // Clean inputs
            const market = document.getElementById('market').value.trim();
            const eans = document.getElementById('eans').value.split('\n').map(e => e.trim()).filter(e => e);
            
            if(eans.length > 10) {
                alert("Maximum 10 EANs allowed per request.");
                return;
            }

            btn.disabled = true;
            btn.classList.add('opacity-50');
            loading.classList.remove('hidden');
            resultsContainer.classList.add('hidden');
            resultsBody.innerHTML = '';

            try {
                const response = await fetch('/scrape', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ market, eans })
                });
                
                const data = await response.json();
                
                if(!response.ok) throw new Error(data.detail || "Server Error");
                
                for (const [ean, info] of Object.entries(data.results)) {
                    let rowHtml = `<td class="p-3 border-b font-mono text-sm">${ean}</td>`;
                    
                    if (info.error || info.status === "No data found") {
                        rowHtml += `<td colspan="8" class="p-3 border-b text-red-500">${info.error || info.status}</td>`;
                    } else {
                        rowHtml += `
                            <td class="p-3 border-b">${info.vendor_name || '-'}</td>
                            <td class="p-3 border-b">${info.currency || '-'}</td>
                            <td class="p-3 border-b font-semibold">${info.rsv_incl_vat || '-'}</td>
                            <td class="p-3 border-b text-xs">${info.vat_info || '-'}</td>
                            <td class="p-3 border-b text-red-600">${info.promo_price || '-'}</td>
                            <td class="p-3 border-b"><span class="bg-gray-200 px-2 py-1 rounded text-xs">${info.price_type_flag || '-'}</span></td>
                            <td class="p-3 border-b text-sm">${info.pack_format || '-'}</td>
                            <td class="p-3 border-b"><a href="${info.source_url}" target="_blank" class="text-blue-500 hover:underline text-sm">Link</a></td>
                        `;
                    }
                    
                    const tr = document.createElement('tr');
                    tr.innerHTML = rowHtml;
                    resultsBody.appendChild(tr);
                }
                
                resultsContainer.classList.remove('hidden');
            } catch (err) {
                alert("An error occurred: " + err.message);
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-50');
                loading.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
