services:
  - type: web
    name: ean-price-scraper
    env: python
    buildCommand: "./build.sh"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: SERPER_API_KEY
        sync: false
      - key: EAN_SEARCH_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
