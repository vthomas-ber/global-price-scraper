<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Price Scraper</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0f14;
  --surface: #151921;
  --surface-2: #1c2230;
  --surface-3: #232a38;
  --border: #2a3245;
  --border-focus: #4a7cff;
  --text: #e4e8f1;
  --text-dim: #8892a8;
  --text-muted: #5d6780;
  --accent: #4a7cff;
  --accent-glow: rgba(74,124,255,0.15);
  --success: #34d399;
  --success-bg: rgba(52,211,153,0.08);
  --warn: #fbbf24;
  --warn-bg: rgba(251,191,36,0.08);
  --error: #f87171;
  --error-bg: rgba(248,113,113,0.08);
  --radius: 10px;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'DM Sans', -apple-system, sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--sans); background: var(--bg);
  color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased;
}
.container { max-width: 1440px; margin: 0 auto; padding: 40px 24px 80px; }

/* Header */
.header { margin-bottom: 36px; }
.header h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
.header .sub { color: var(--text-dim); font-size: 14px; margin-top: 4px; }

/* Input card */
.input-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 24px 28px; margin-bottom: 32px;
}
.input-row { display: flex; gap: 20px; align-items: flex-start; }
.field { display: flex; flex-direction: column; gap: 6px; }
.field-market { width: 190px; flex-shrink: 0; }
.field-eans { flex: 1; }
.field label {
  font-size: 11px; font-weight: 600; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 0.6px;
}
select, textarea {
  font-family: var(--mono); font-size: 13px; color: var(--text);
  background: var(--surface-2); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 12px; outline: none; transition: border-color 0.2s;
}
select:focus, textarea:focus {
  border-color: var(--border-focus); box-shadow: 0 0 0 3px var(--accent-glow);
}
textarea { resize: vertical; min-height: 100px; line-height: 1.6; }
select { cursor: pointer; height: 40px; }
select option { background: var(--surface-2); }

.actions { display: flex; align-items: center; gap: 16px; margin-top: 18px; }
.btn-run {
  font-family: var(--sans); font-size: 13px; font-weight: 600;
  padding: 10px 28px; border-radius: 8px; border: none; cursor: pointer;
  color: #fff; background: var(--accent); transition: all 0.2s;
  display: flex; align-items: center; gap: 8px;
}
.btn-run:hover:not(:disabled) { background: #3a6cf0; transform: translateY(-1px); }
.btn-run:disabled { opacity: 0.45; cursor: not-allowed; }
.status-msg { font-size: 12px; color: var(--text-dim); font-family: var(--mono); }
.spinner {
  width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff; border-radius: 50%;
  animation: spin 0.6s linear infinite; display: none;
}
.btn-run.loading .spinner { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Progress bar */
.progress-wrap {
  display: none; margin-top: 12px; background: var(--surface-2);
  border-radius: 6px; height: 6px; overflow: hidden;
}
.progress-wrap.active { display: block; }
.progress-bar {
  height: 100%; background: var(--accent); border-radius: 6px;
  transition: width 0.4s ease; width: 0%;
}

/* Results — single consolidated table */
.results-section { margin-top: 8px; }
.results-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
  animation: fadeUp 0.3s ease;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.results-title {
  padding: 16px 24px; background: var(--surface-2);
  border-bottom: 1px solid var(--border);
  font-size: 15px; font-weight: 700;
}

/* Table */
.table-wrap { overflow-x: auto; }
.ptable {
  width: 100%; border-collapse: collapse; font-size: 12.5px;
}
.ptable th {
  background: var(--surface-3); color: var(--text-dim);
  font-size: 10.5px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.4px; padding: 10px 12px; text-align: left;
  white-space: nowrap; border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 1;
}
.ptable td {
  padding: 9px 12px; border-bottom: 1px solid var(--border);
  vertical-align: top; line-height: 1.45;
}
.ptable tr:last-child td { border-bottom: none; }
.ptable tr:hover td { background: rgba(74,124,255,0.04); }

/* EAN group separator row */
.ptable tr.ean-sep td {
  background: var(--surface-2); font-weight: 600;
  font-family: var(--mono); font-size: 12px; padding: 8px 12px;
  color: var(--text); border-bottom: 1px solid var(--border);
}

.ptable .mono { font-family: var(--mono); }
.ptable .price { font-family: var(--mono); font-weight: 600; }
.ptable .url-cell { max-width: 180px; }
.ptable .url-cell a {
  color: var(--accent); text-decoration: none; font-size: 11.5px;
  word-break: break-all;
}
.ptable .url-cell a:hover { text-decoration: underline; }

/* Flags */
.flag {
  display: inline-block; font-size: 10.5px; font-weight: 600;
  padding: 2px 7px; border-radius: 4px; white-space: nowrap;
}
.flag-regular { background: var(--success-bg); color: var(--success); }
.flag-promo { background: var(--warn-bg); color: var(--warn); }
.flag-niche, .flag-clearance, .flag-d2c { background: var(--warn-bg); color: var(--warn); }
.flag-name-match { background: rgba(139,92,246,0.12); color: #a78bfa; }
.flag-nodata { background: var(--error-bg); color: var(--error); }
.flag-noncomp { background: rgba(148,163,184,0.12); color: #94a3b8; }

/* No data row */
.no-data-row td { color: var(--text-muted); font-style: italic; }

/* Average RSV summary */
.avg-block {
  padding: 16px 24px; background: var(--surface-2);
  border-top: 1px solid var(--border);
}
.avg-block h3 {
  font-size: 13px; font-weight: 700; margin-bottom: 10px;
  color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.4px;
}
.avg-grid { display: flex; flex-wrap: wrap; gap: 20px; }
.avg-card {
  background: var(--surface-3); border-radius: 8px;
  padding: 12px 16px; min-width: 220px; flex: 1;
}
.avg-card .ean-label { font-family: var(--mono); font-size: 11px; color: var(--text-dim); margin-bottom: 6px; }
.avg-card .avg-vals { display: flex; gap: 16px; }
.avg-card .avg-val span { font-size: 11px; color: var(--text-muted); display: block; }
.avg-card .avg-val strong { font-family: var(--mono); color: var(--success); font-size: 14px; }
.avg-card .avg-val.none strong { color: var(--text-muted); }

/* Error */
.error-msg {
  padding: 16px 24px; background: var(--error-bg);
  color: var(--error); font-size: 13px; font-family: var(--mono);
  border-radius: var(--radius);
}

/* Export button */
.btn-export {
  font-family: var(--sans); font-size: 12px; font-weight: 600;
  padding: 7px 16px; border-radius: 6px; border: 1px solid var(--border);
  cursor: pointer; color: var(--text-dim); background: var(--surface-2);
  transition: all 0.2s; margin-left: auto;
}
.btn-export:hover { border-color: var(--accent); color: var(--text); }

@media (max-width: 700px) {
  .input-row { flex-direction: column; }
  .field-market { width: 100%; }
  .container { padding: 20px 12px 60px; }
  .avg-grid { flex-direction: column; }
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Global Price Scraper</h1>
    <div class="sub">EAN-based retail price extraction — exhaustive phased search</div>
  </div>

  <div class="input-card">
    <div class="input-row">
      <div class="field field-market">
        <label>Market</label>
        <select id="market">
          <option value="UK">UK — GBP</option>
          <option value="NL">NL — EUR</option>
          <option value="DE">DE — EUR</option>
          <option value="FR">FR — EUR</option>
          <option value="BE">BE — EUR</option>
          <option value="IT">IT — EUR</option>
          <option value="ES">ES — EUR</option>
          <option value="PT">PT — EUR</option>
          <option value="DK">DK — DKK</option>
          <option value="SE">SE — SEK</option>
          <option value="NO">NO — NOK</option>
          <option value="PL">PL — PLN</option>
        </select>
      </div>
      <div class="field field-eans">
        <label>EANs (1 per line, max 10)</label>
        <textarea id="eans" placeholder="612322001773&#10;5000239054022&#10;5000354912337&#10;5060139435215&#10;5060040257036"></textarea>
      </div>
    </div>
    <div class="actions">
      <button class="btn-run" id="runBtn" onclick="runScraper()">
        <span class="spinner"></span>
        <span class="btn-text">Run Scraper</span>
      </button>
      <span class="status-msg" id="statusMsg"></span>
    </div>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>

  <div class="results-section" id="results"></div>
</div>

<script>
let lastData = null;

async function runScraper() {
  const btn = document.getElementById('runBtn');
  const statusMsg = document.getElementById('statusMsg');
  const resultsEl = document.getElementById('results');
  const progressWrap = document.getElementById('progressWrap');
  const progressBar = document.getElementById('progressBar');

  const market = document.getElementById('market').value;
  const eanText = document.getElementById('eans').value.trim();
  const eans = eanText.split('\n').map(e => e.trim()).filter(e => e.length > 0);

  if (!eans.length) { statusMsg.textContent = 'Enter at least one EAN.'; return; }
  if (eans.length > 10) { statusMsg.textContent = 'Max 10 EANs per request.'; return; }

  btn.disabled = true;
  btn.classList.add('loading');
  btn.querySelector('.btn-text').textContent = 'Scraping…';
  statusMsg.textContent = `Processing ${eans.length} EAN${eans.length > 1 ? 's' : ''} — this may take 30-90 seconds…`;
  resultsEl.innerHTML = '';
  progressWrap.classList.add('active');
  progressBar.style.width = '0%';

  // Fake progress
  let pct = 0;
  const pInterval = setInterval(() => {
    pct = Math.min(pct + (90 - pct) * 0.04, 90);
    progressBar.style.width = pct + '%';
  }, 500);

  try {
    const res = await fetch('/scrape', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ market, eans })
    });

    clearInterval(pInterval);
    progressBar.style.width = '100%';

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || `HTTP ${res.status}`);
    }

    const data = await res.json();
    lastData = data;
    renderConsolidatedTable(data);
    statusMsg.textContent = `Done — ${eans.length} EAN${eans.length > 1 ? 's' : ''} processed.`;

  } catch (e) {
    clearInterval(pInterval);
    statusMsg.textContent = `Error: ${e.message}`;
    resultsEl.innerHTML = `<div class="error-msg">${esc(e.message)}</div>`;
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
    btn.querySelector('.btn-text').textContent = 'Run Scraper';
    setTimeout(() => { progressWrap.classList.remove('active'); }, 600);
  }
}

function renderConsolidatedTable(data) {
  const el = document.getElementById('results');
  const results = data.results || [];
  const averages = data.averages || {};
  const currSymbol = { GBP: '£', EUR: '€', DKK: 'kr', SEK: 'kr', NOK: 'kr', PLN: 'zł' }[data.currency] || '';

  // Build consolidated rows
  let allRows = [];
  let noDataEans = [];

  for (const result of results) {
    const ean = result.ean || '?';
    const md = result.master_data || {};
    const prices = result.prices || [];

    if (result.status === 'error') {
      noDataEans.push({ ean, brand: md.brand || '-', name: md.product_name || '-', reason: result.error || 'Error' });
    } else if (prices.length === 0) {
      noDataEans.push({
        ean, brand: md.brand || '-', name: md.product_name || '-',
        reason: 'No data found' + (result.ean_valid ? ' (EAN valid)' : '')
      });
    } else {
      for (const p of prices) {
        allRows.push({ ean, brand: md.brand || '', name: md.product_name || '', ...p });
      }
    }
  }

  let html = `<div class="results-card">`;
  html += `<div class="results-title" style="display:flex;align-items:center;">
    <span>Consolidated Pricing Table</span>
    <button class="btn-export" onclick="exportCSV()">Export CSV</button>
  </div>`;

  html += `<div class="table-wrap"><table class="ptable">`;
  html += `<thead><tr>
    <th>EAN</th>
    <th>Brand</th>
    <th>Product Name</th>
    <th>Grocery Vendor Name</th>
    <th>Market</th>
    <th>Currency</th>
    <th>RSV (Regular/Base) incl. VAT</th>
    <th>VAT Info</th>
    <th>Promo Price</th>
    <th>Price Type Flag</th>
    <th>Pack Format</th>
    <th>Calculated Per-Unit RSV</th>
    <th>Source Website URL</th>
  </tr></thead><tbody>`;

  // Group rows by EAN for visual clarity
  let currentEan = null;
  for (const r of allRows) {
    if (r.ean !== currentEan) {
      currentEan = r.ean;
    }
    const flagClass = getFlagClass(r.price_type_flag);
    html += `<tr>
      <td class="mono">${esc(r.ean)}</td>
      <td>${esc(r.brand)}</td>
      <td>${esc(r.name)}</td>
      <td>${esc(r.vendor_name || '-')}</td>
      <td>${esc(r.market || data.market)}</td>
      <td>${esc(r.currency || data.currency)}</td>
      <td class="price">${esc(r.rsv_incl_vat || '-')}</td>
      <td>${esc(r.vat_info || '-')}</td>
      <td class="price">${esc(r.promo_price || '-')}</td>
      <td><span class="flag ${flagClass}">${esc(r.price_type_flag || '-')}</span></td>
      <td>${esc(r.pack_format || '-')}</td>
      <td>${esc(r.per_unit_rsv || '-')}</td>
      <td class="url-cell">${r.source_url ? `<a href="${escA(r.source_url)}" target="_blank" rel="noopener">${esc(shortenUrl(r.source_url))}</a>` : '-'}</td>
    </tr>`;
  }

  // No-data rows
  for (const nd of noDataEans) {
    html += `<tr class="no-data-row">
      <td class="mono">${esc(nd.ean)}</td>
      <td>${esc(nd.brand)}</td>
      <td>${esc(nd.name)}</td>
      <td colspan="10" style="color:var(--text-muted);font-style:italic;">${esc(nd.reason)}</td>
    </tr>`;
  }

  if (allRows.length === 0 && noDataEans.length === 0) {
    html += `<tr><td colspan="13" style="text-align:center;color:var(--text-muted);padding:24px;">No results</td></tr>`;
  }

  html += `</tbody></table></div>`;

  // Average RSV section
  const avgEntries = Object.entries(averages).filter(([_, v]) => v.standard_avg != null || v.total_avg != null);
  if (avgEntries.length > 0) {
    html += `<div class="avg-block"><h3>Average RSV Summary</h3><div class="avg-grid">`;
    for (const [ean, avg] of avgEntries) {
      // Find brand/name for this EAN
      const r = results.find(x => x.ean === ean);
      const md = r?.master_data || {};
      html += `<div class="avg-card">
        <div class="ean-label">${esc(ean)} — ${esc(md.brand || '')} ${esc(md.product_name || '')}</div>
        <div class="avg-vals">`;
      if (avg.standard_avg != null) {
        html += `<div class="avg-val"><span>Standard Retail</span><strong>${currSymbol}${avg.standard_avg}</strong></div>`;
      }
      if (avg.total_avg != null && avg.total_avg !== avg.standard_avg) {
        html += `<div class="avg-val"><span>Total Market</span><strong>${currSymbol}${avg.total_avg}</strong></div>`;
      } else if (avg.standard_avg == null && avg.total_avg != null) {
        html += `<div class="avg-val"><span>Total Market</span><strong>${currSymbol}${avg.total_avg}</strong></div>`;
      }
      if (avg.standard_avg == null && avg.total_avg == null) {
        html += `<div class="avg-val none"><span>Average</span><strong>N/A</strong></div>`;
      }
      html += `</div></div>`;
    }
    html += `</div></div>`;
  }

  html += `</div>`;
  el.innerHTML = html;
}

function exportCSV() {
  if (!lastData) return;
  const results = lastData.results || [];
  const headers = ['EAN','Brand','Product Name','Grocery Vendor Name','Market','Currency',
    'RSV (Regular/Base) incl. VAT','VAT Info','Promo Price','Price Type Flag',
    'Pack Format','Calculated Per-Unit RSV','Source Website URL'];

  let rows = [headers.join(',')];
  for (const result of results) {
    const md = result.master_data || {};
    const prices = result.prices || [];
    if (prices.length === 0) {
      rows.push([result.ean, md.brand||'', md.product_name||'', 'No data found','','','','','','','','',''].map(csvEsc).join(','));
    } else {
      for (const p of prices) {
        rows.push([
          result.ean, md.brand||'', md.product_name||'',
          p.vendor_name||'', p.market||'', p.currency||'',
          p.rsv_incl_vat||'', p.vat_info||'', p.promo_price||'',
          p.price_type_flag||'', p.pack_format||'', p.per_unit_rsv||'',
          p.source_url||''
        ].map(csvEsc).join(','));
      }
    }
  }

  const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `price-scrape-${lastData.market}-${Date.now()}.csv`;
  a.click(); URL.revokeObjectURL(url);
}

function csvEsc(v) {
  v = String(v || '');
  if (v.includes(',') || v.includes('"') || v.includes('\n')) return '"' + v.replace(/"/g, '""') + '"';
  return v;
}

function shortenUrl(url) {
  try {
    const u = new URL(url);
    return u.hostname + u.pathname.substring(0, 40) + (u.pathname.length > 40 ? '…' : '');
  } catch { return url.substring(0, 50); }
}

function getFlagClass(flag) {
  if (!flag) return '';
  const f = flag.toLowerCase();
  if (f === 'regular') return 'flag-regular';
  if (f === 'promo-only') return 'flag-promo';
  if (f.includes('name match')) return 'flag-name-match';
  if (f.includes('clearance')) return 'flag-clearance';
  if (f.includes('d2c')) return 'flag-d2c';
  if (f.includes('niche')) return 'flag-niche';
  if (f.includes('non-comparable') || f.includes('noncomp')) return 'flag-noncomp';
  return 'flag-regular';
}

function esc(s) { const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; }
function escA(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
